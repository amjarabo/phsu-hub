// ── MINI CHART COMPONENTS ─────────────────────────────────────────────────────
function BarChart({ data, keyX, keyY, color = C.teal, height = 120 }) {
  const max = Math.max(...data.map(d => d[keyY]));
  return (
    <div style={{ display: "flex", alignItems: "flex-end", gap: 4, height, padding: "4px 0" }}>
      {data.map((d, i) => (
        <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
          <div style={{ width: "100%", background: `${color}22`, borderRadius: "3px 3px 0 0", height: height - 20, position: "relative" }}>
            <div style={{
              position: "absolute", bottom: 0, left: 0, right: 0,
              background: `linear-gradient(180deg,${color}CC,${color})`,
              height: `${(d[keyY] / max) * 100}%`,
              borderRadius: "3px 3px 0 0",
              transition: "height 0.6s ease",
            }} />
          </div>
          <span style={{ fontSize: 9, color: C.tx3, whiteSpace: "nowrap", overflow: "hidden", maxWidth: "100%", textOverflow: "ellipsis" }}>{d[keyX]}</span>
        </div>
      ))}
    </div>
  );
}

function FunnelViz({ data }) {

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
      {data.map((d, i) => (
        <div key={i} style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ width: 110, fontSize: 10, color: C.tx2, textAlign: "right", flexShrink: 0 }}>{d.stage}</div>

            <div style={{

              width: `${(d.count / max) * 100}%`,
              background: `linear-gradient(90deg,${C.teal}CC,${C.tm})`,
              borderRadius: 4,
              display: "flex", alignItems: "center", paddingLeft: 8,
            }}>
              <span style={{ fontSize: 10, fontWeight: 700, color: "#fff", whiteSpace: "nowrap" }}>{d.count.toLocaleString()}</span>
            </div>

function DonutMini({ value, max, color, size = 48 }) {
  const pct = (value / max) * 100;
  const r = 18, circ = 2 * Math.PI * r;
  const dash = (pct / 100) * circ;
  return (
    <svg width={size} height={size} viewBox="0 0 44 44">
      <circle cx="22" cy="22" r={r} fill="none" stroke={`${color}22`} strokeWidth={5} />
      <circle cx="22" cy="22" r={r} fill="none" stroke={color} strokeWidth={5}
        strokeDasharray={`${dash} ${circ - dash}`} strokeDashoffset={circ / 4}
        strokeLinecap="round" style={{ transition: "stroke-dasharray 0.6s ease" }} />
      <text x="22" y="26" textAnchor="middle" fontSize="10" fontWeight="700" fill={color}>{Math.round(pct)}%</text>
    </svg>
  );
}

function TrendLine({ data, color = C.teal, height = 40 }) {
  const max = Math.max(...data), min = Math.min(...data);
  const range = max - min || 1;
  const w = 120, h = height;
  const pts = data.map((v, i) => `${(i / (data.length - 1)) * w},${h - ((v - min) / range) * (h - 8) - 4}`).join(" ");
  const area = `M0,${h} L${pts.split(" ").map(p => p).join(" L")} L${w},${h} Z`;
  return (
    <svg width={w} height={h} style={{ overflow: "visible" }}>
      <defs>
        <linearGradient id={`tg${color.replace("#","")}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.3" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      <path d={area} fill={`url(#tg${color.replace("#","")})`} />
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
}

    return (
      <div>
        <div style={s.h1}>Settings & Credentials</div>
        <div style={{ fontSize: 12, color: C.tx2, marginTop: 3, marginBottom: 20 }}>All credentials are stored locally in your browser only — never sent to any server except the respective API.</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
          {[
            { label: "Anthropic API Key", val: localApiKey, set: setLocalApiKey, ph: "sk-ant-...", help: "Get from console.anthropic.com → API Keys. Powers the AI analysis engine." },
            { label: "Element451 API Key", val: localE451, set: setLocalE451, ph: "e451_...", help: "Get from Element451 Admin → Settings → Manage Users → Security → API Keys." },
            { label: "Salesforce Access Token", val: localSF, set: setLocalSF, ph: "00D...", help: "Get from Salesforce → Setup → API → OAuth token or Named Credentials." },
          ].map(f => (
            <div key={f.label} style={s.card}>
              <div style={{ fontWeight: 700, color: C.tx, marginBottom: 4 }}>{f.label}</div>
              <div style={{ fontSize: 11, color: C.tx3, marginBottom: 8 }}>{f.help}</div>
              <input type="password" value={f.val} onChange={e => f.set(e.target.value)} placeholder={f.ph} style={s.inp} />
            </div>
          ))}
          <div style={s.card}>
            <div style={{ fontWeight: 700, color: C.tx, marginBottom: 4 }}>Make.com Webhook URLs</div>
            <div style={{ fontSize: 11, color: C.tx3, marginBottom: 12 }}>In Make.com: Create scenario → Add "Webhooks" module → "Custom webhook" → Copy URL here</div>
            {makeScenarios.map(k => (
              <div key={k} style={{ marginBottom: 10 }}>
                <div style={{ fontSize: 11, color: C.tx2, marginBottom: 4 }}>{k.replace(/_/g, " ")}</div>
                <input value={makeUrls[k]} onChange={e => setMakeUrls(u => ({ ...u, [k]: e.target.value }))} placeholder="https://hook.eu1.make.com/..." style={{ ...s.inp, fontSize: 11 }} />
              </div>
            ))}
          </div>
          <button onClick={save} style={{ ...s.btn(), padding: "11px 24px", fontSize: 13, width: "fit-content" }}>💾 Save All Settings</button>
        </div>
      </div>
    );
  };

  // ── RENDER ─────────────────────────────────────────────────────────────────
  const TABS = [
    ["overview", "📊 Overview"],
    ["programs", "🎓 Programs"],
    ["insights", "💡 Insights"],
    ["analyze", "🔍 Analysis"],
    ["automation", "⚡ Automation"],
    ["settings", "⚙ Settings"],
  ];

  return (
    <div style={s.app}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Crimson+Pro:wght@300;400;600&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: #1E2D3D; border-radius: 4px; }
        select, input, textarea { background: #182030; color: #E8EDF5; }
        select option { background: #182030; }
        @keyframes pulse { 0%,100% { opacity:.3; transform:scale(.8); } 50% { opacity:1; transform:scale(1); } }
      `}</style>
      <div style={s.topbar}>
        <div style={s.logo}>P</div>
        <div>
          <div style={{ fontSize: 14, fontWeight: 700, color: "#fff" }}>PHSU Analytics Platform</div>
          <div style={{ fontSize: 10, color: C.tx3 }}>Admissions Analytics · Smart Analysis · Automation</div>
        </div>
        <div style={{ marginLeft: "auto", display: "flex", gap: 8 }}>
          <button onClick={fetchAll} style={{ ...s.btn(), padding: "6px 12px", fontSize: 11 }}>↻ Sync All Data</button>
          <div style={{ ...s.pill(C.gn), gap: 5 }}>● Live</div>
        </div>
      </div>
      <div style={s.tabs}>
        {TABS.map(([id, label]) => (
          <div key={id} onClick={() => setTab(id)} style={s.tab(tab === id)}>{label}</div>
        ))}
      </div>
      <div style={s.main}>
        {tab === "overview"    && <OverviewTab />}
        {tab === "programs"    && <ProgramsTab />}
        {tab === "insights"    && <InsightsTab />}
        {tab === "analyze"     && <AnalyzeTab />}
        {tab === "automation"  && <AutomationTab />}
        {tab === "settings"    && <SettingsTab />}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(PHSUIntelligence));

// Hide loading screen
setTimeout(() => {
  const ls = document.getElementById('loading-screen');
  if(ls) { ls.style.opacity = '0'; setTimeout(() => ls.remove(), 300); }
}, 400);
</script>
</body>
</html>
